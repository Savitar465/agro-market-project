version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agro-market-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agro_market_pass}
      POSTGRES_DB: agro_market
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agro-market-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agro-market-api
    ports:
      - "3001:3001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agro_market_pass}
      POSTGRES_DATABASE: agro_market
      PORT: 3001
      MODE: PROD
      RUN_MIGRATIONS: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agro-market-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  agro-market-network:
    driver: bridge

